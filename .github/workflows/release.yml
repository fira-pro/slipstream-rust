name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  # Speeds up builds by caching compiled dependencies
  CARGO_INCREMENTAL: 0

jobs:
  # ── Linux x86_64 (musl static, runs on any Linux ≥ Ubuntu 20) ───────────────
  build-linux:
    name: Linux x86_64 (static musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-musl-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries (musl)
        run: |
          cargo build --release \
            --target x86_64-unknown-linux-musl \
            -p slipstream-client \
            -p slipstream-server

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/slipstream-client \
             dist/slipstream-client-linux-x86_64
          cp target/x86_64-unknown-linux-musl/release/slipstream-server \
             dist/slipstream-server-linux-x86_64
          chmod +x dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: dist/

  # ── Windows x86_64 ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release -p slipstream-client -p slipstream-server

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/slipstream-client.exe dist/slipstream-client-windows-x86_64.exe
          Copy-Item target/release/slipstream-server.exe dist/slipstream-server-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist/

  # ── Android ─────────────────────────────────────────────────────────────────
  build-android:
    name: Android ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            arch: arm64-v8a
          - target: armv7-linux-androideabi
            arch: armeabi-v7a
          - target: x86_64-linux-android
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: android-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install Android NDK
        run: |
          # GitHub ubuntu-latest ships with Android SDK but NDK often needs explicit install
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018" --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Build release binaries
        run: |
          cargo ndk \
            --target ${{ matrix.target }} \
            --platform 21 \
            build --release \
            -p slipstream-client \
            -p slipstream-server

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/slipstream-client \
             dist/slipstream-client-android-${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/slipstream-server \
             dist/slipstream-server-android-${{ matrix.arch }}
          chmod +x dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.arch }}
          path: dist/

  # ── Publish GitHub Release ───────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: slipstream-rust ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*
